name = "wservice-memo-alarm"
compatibility_date = "2026-01-05"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# 알림은 Supabase Edge Function + FCM으로 처리
# 참고: docs/ARCHITECTURE_FCM.md

# Environment variables
# 로컬: .dev.vars 파일에 설정 (gitignored)
# 프로덕션: Cloudflare dashboard > Workers > wservice-memo-alarm > Settings > Variables
# wrangler deploy가 dashboard 값을 덮어쓰지 않도록 [vars]에 placeholder를 두지 않는다
# [vars]
# PUBLIC_SUPABASE_URL = ""
# PUBLIC_SUPABASE_ANON_KEY = ""
