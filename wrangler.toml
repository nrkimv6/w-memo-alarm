name = "wservice-memo-alarm"
compatibility_date = "2026-01-05"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# 알림은 Supabase Edge Function + FCM으로 처리
# 참고: docs/ARCHITECTURE_FCM.md

# Environment variables
# These are placeholders - actual values should be set in .dev.vars (local) or Cloudflare dashboard (production)
[vars]
PUBLIC_SUPABASE_URL = "https://your-project.supabase.co"
PUBLIC_SUPABASE_ANON_KEY = "your-anon-key-here"
