name = "wservice-memo-alarm"
compatibility_date = "2026-01-05"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# Web Push (VAPID) 환경 변수
# 실제 값은 Cloudflare Dashboard > Settings > Variables에서 설정
# [vars]
# VAPID_PUBLIC_KEY = "your-public-key"
# VAPID_SUBJECT = "mailto:contact@woory.day"
# CRON_SECRET = "your-secret-key"

# VAPID_PRIVATE_KEY는 시크릿으로 설정 (wrangler secret put VAPID_PRIVATE_KEY)

# Cron Trigger (외부 cron 서비스로 /api/cron/send-push 호출)
# [triggers]
# crons = ["* * * * *"]  # 매분 실행
