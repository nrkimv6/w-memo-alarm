<!doctype html>
<html lang="ko">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>메모알람 - 싱글 태스킹 메모 알람 앱</title>
	<meta name="description"
		content="메모와 알람을 하나로 통합한 스마트 알림 서비스입니다. 싱글 태스킹 철학을 바탕으로 한 번에 하나의 일에 집중하도록 돕고, 제2의 뇌로 중요한 일정과 할 일을 관리하세요. 반복 알람, URL 링크, 오프라인 지원 기능 제공." />
	<meta name="keywords" content="메모 알람, 싱글 태스킹, 할 일 관리, 알림 앱, 메모 앱, 생산성, 시간 관리, 기억 보조, 반복 알람, 일정 관리" />
	<meta name="author" content="Woory.day" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
	<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
	<link rel="canonical" href="https://memo.woory.day" />
	<meta name="theme-color" content="#4d8066" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="#5fa87a" media="(prefers-color-scheme: dark)" />

	<!-- Open Graph / Facebook -->
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://memo.woory.day" />
	<meta property="og:title" content="메모알람 - 싱글 태스킹 메모 알람 앱" />
	<meta property="og:description" content="메모와 알람을 하나로 통합한 스마트 알림 서비스입니다. 싱글 태스킹으로 집중력을 높이고 제2의 뇌로 중요한 일정을 관리하세요." />
	<meta property="og:image" content="https://memo.woory.day/og-image.png" />
	<meta property="og:site_name" content="메모알람" />

	<!-- Twitter -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:url" content="https://memo.woory.day" />
	<meta name="twitter:title" content="메모알람 - 싱글 태스킹 메모 알람 앱" />
	<meta name="twitter:description" content="메모와 알람을 하나로 통합한 스마트 알림 서비스" />
	<meta name="twitter:image" content="https://memo.woory.day/og-image.png" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<meta name="apple-mobile-web-app-title" content="메모알람" />
	<meta name="mobile-web-app-capable" content="yes" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
		rel="stylesheet" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover" style="background-color: #faf8f5;">
	<script>
		// CSS 로딩 전 다크모드 flash 방지: localStorage에서 테마를 먼저 적용
		(function() {
			var t = localStorage.getItem('memo-alarm-theme');
			if (t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
				document.documentElement.classList.add('dark');
				document.body.style.backgroundColor = '#1c1714';
			}
		})();
	</script>
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
